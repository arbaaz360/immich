      /**
       * Prevent FOUC on page load.
       */
      const colorThemeKeyName = 'color-theme';

      let theme = localStorage.getItem(colorThemeKeyName);
      if (!theme) {
        theme = { value: 'light', system: true };
      } else if (theme === 'dark' || theme === 'light') {
        theme = { value: theme, system: false };
        localStorage.setItem(colorThemeKeyName, JSON.stringify(theme));
      } else {
        theme = JSON.parse(theme);
      }

      let themeValue = theme.value;
      if (theme.system) {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          themeValue = 'dark';
        } else {
          themeValue = 'light';
        }
      }

      if (themeValue === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    </script>

      (() => {
        const enabledKey = 'immichAlbumCountFilterEnabled';

        const pickerBase = `${location.protocol}//${location.hostname}:3111`;

          get minimum() {
            return Math.max(0, Number.parseInt(localStorage.getItem(minimumKey) || '30', 10) || 0);

           const idealWidth = candidateCount > 0 ? candidateCount * 142 + Math.max(0, candidateCount - 1) * 12 + 24 : 320;
           const width = Math.min(760, Math.max(180, idealWidth), window.innerWidth - margin * 2);
          const height = Math.min(680, window.innerHeight - margin * 2);
          const rect = anchor.getBoundingClientRect();
          const rightSide = rect.right + margin;
          const leftSide = rect.left - width - margin;
          const left = rightSide + width + margin <= window.innerWidth
            ? rightSide
            : Math.max(margin, Math.min(window.innerWidth - width - margin, leftSide));
          const top = Math.max(margin, Math.min(window.innerHeight - height - margin, rect.top));
           tooltip.style.width = `${width}px`;
          tooltip.style.left = `${left}px`;
          tooltip.style.top = `${top}px`;
        };

         const renderCandidates = (tooltip, albumId, payload) => {
           const candidates = payload.candidates || [];
           const visibleCount = Math.min(5, candidates.length);
           tooltip.dataset.candidateCount = String(visibleCount);
           tooltip.style.setProperty('--candidate-count', String(Math.max(1, visibleCount)));
          if (!candidates.length) {
            tooltip.innerHTML = `<strong>${payload.albumName || 'Album cover candidates'}</strong><div>No face candidates found.</div>`;
            return;
          }

          tooltip.innerHTML = `
            <strong>${payload.albumName || 'Album cover candidates'}</strong>
            <div class="profile-cover-grid"></div>
            <div class="profile-cover-status">Click a result to set it as cover.</div>
          `;
          const grid = tooltip.querySelector('.profile-cover-grid');
          const status = tooltip.querySelector('.profile-cover-status');
          candidates.slice(0, 5).forEach((candidate) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.title = `Set #${candidate.rank} as album cover`;
            const imageUrl = candidate.thumbnailUrl || candidate.cropUrl;
            button.innerHTML = `
              <img src="${imageUrl}" alt="Cover candidate ${candidate.rank}">
              <span>#${candidate.rank} score ${Number(candidate.score || 0).toFixed(3)}</span>
            `;
            button.addEventListener('click', async (event) => {
              event.preventDefault();
              event.stopPropagation();
              status.textContent = 'Setting cover...';
              const response = await fetch(`${pickerBase}/api/set-cover?albumId=${albumId}&assetId=${candidate.assetId}`);
              if (!response.ok) {
                throw new Error(await response.text());
              }
              status.textContent = `Cover set to #${candidate.rank}. Refresh Immich if the old cover is still cached.`;
            });
            grid.append(button);
          });
        };

        const showTooltip = async (link) => {
          const albumId = albumIdFromLink(link);
          if (!albumId) {
            return;
          }
          clearTimeout(hideTimer);
          activeAlbumId = albumId;
           const tooltip = getTooltip();
           tooltip.dataset.candidateCount = '0';
          tooltip.style.display = 'block';
          tooltip.innerHTML = '<strong>Album cover candidates</strong><div>Loading top 5...</div>';
          positionTooltip(tooltip, link);

          try {
            const payload = candidateCache.get(albumId) || await fetch(`${pickerBase}/api/album/${albumId}/candidates?fast=1`).then((response) => {
              if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
              }
              return response.json();
            });
            candidateCache.set(albumId, payload);
            if (activeAlbumId === albumId) {
              renderCandidates(tooltip, albumId, payload);
              positionTooltip(tooltip, link);
            }
          } catch (error) {
            if (activeAlbumId === albumId) {
              tooltip.innerHTML = `<strong>Album cover candidates</strong><div>Could not load candidates: ${String(error.message || error)}</div>`;
            }
          }
        };

        const currentPhotoAssetId = () => location.pathname.match(photoAssetPattern)?.[1] || '';

        const originalImageUrl = (assetId) => `/api/assets/${assetId}/original`;

        const extensionCopyEventName = 'album-sentinel-copy-original-image';

        const supportsImageClipboardWrite = () => Boolean(navigator.clipboard?.write && window.ClipboardItem);

        const supportsExtensionImageCopy = () => (
          document.documentElement.dataset.albumSentinelCopyAvailable === 'true'
        );

        const copyButtonText = () => (
          supportsExtensionImageCopy() || supportsImageClipboardWrite() ? 'Copy image' : 'Open image'
        );

        const copyButtonTitle = () => (
          supportsExtensionImageCopy()
            ? 'Copy this image using Album Sentinel'
            : supportsImageClipboardWrite()
              ? 'Copy the original image to clipboard'
              : 'Open the original image so the browser context menu can copy it'
        );

        const displayedImageUrlForAsset = (assetId) => {
          const images = Array.from(document.images || [])
            .filter((image) => (image.currentSrc || image.src || '').includes(assetId))
            .map((image) => {
              const rect = image.getBoundingClientRect();
              return {
                image,
                area: Math.max(0, rect.width) * Math.max(0, rect.height),
              };
            })
            .sort((a, b) => b.area - a.area);
          return images[0] ? (images[0].image.currentSrc || images[0].image.src || '') : '';
        };

        const imageBlobToPng = async (blob) => {
          if (blob.type === 'image/png') {
            return blob;
          }

          const bitmap = await createImageBitmap(blob);
          try {
            const canvas = document.createElement('canvas');
            canvas.width = bitmap.width;
            canvas.height = bitmap.height;
            const context = canvas.getContext('2d');
            if (!context) {
              throw new Error('Could not create canvas context');
            }
            context.drawImage(bitmap, 0, 0);
            return await new Promise((resolve, reject) => {
              canvas.toBlob((pngBlob) => {
                if (pngBlob) {
                  resolve(pngBlob);
                } else {
                  reject(new Error('Could not convert image for clipboard'));
                }
              }, 'image/png');
            });
          } finally {
            bitmap.close?.();
          }
        };

        const fetchImageBlob = async (url) => {
          const response = await fetch(url, {
            credentials: 'include',
            cache: 'no-store',
          });
          if (!response.ok) {
            throw new Error(`Could not load image: HTTP ${response.status}`);
          }

          const blob = await response.blob();
          if (!blob.type.startsWith('image/')) {
            throw new Error(`This asset is not a browser-copyable image (${blob.type || 'unknown type'})`);
          }

          return blob;
        };

        const clipboardPngBlobForAsset = async (assetId) => {
          try {
            return await imageBlobToPng(await fetchImageBlob(originalImageUrl(assetId)));
          } catch (originalError) {
            const displayedUrl = displayedImageUrlForAsset(assetId);
            if (!displayedUrl) {
              throw originalError;
            }

            return await imageBlobToPng(await fetchImageBlob(displayedUrl));
          }
        };

        const copyOriginalImageToClipboard = (assetId) => {
          if (!supportsImageClipboardWrite()) {
            throw new Error('Image clipboard is not supported by this browser');
          }

          return navigator.clipboard.write([
            new ClipboardItem({ 'image/png': clipboardPngBlobForAsset(assetId) }),
          ]);
        };

        const requestExtensionImageCopy = (assetId) => {
          if (!supportsExtensionImageCopy()) {
            return false;
          }

          document.dispatchEvent(new CustomEvent(extensionCopyEventName, {
            bubbles: true,
            cancelable: true,
            detail: { assetId },
          }));
          return true;
        };

        const openOriginalImageForNativeCopy = (assetId) => {
          window.open(originalImageUrl(assetId), '_blank', 'noopener,noreferrer');
        };

        const getCopyButton = () => {
          let button = document.getElementById(copyButtonId);
          if (button) {
            return button;
          }

          button = document.createElement('button');
          button.id = copyButtonId;
          button.type = 'button';
          button.textContent = copyButtonText();
          button.title = copyButtonTitle();
          button.addEventListener('click', async (event) => {
            event.preventDefault();
            event.stopPropagation();
            const assetId = button.dataset.assetId || currentPhotoAssetId();
            if (!assetId) {
              return;
            }

            if (requestExtensionImageCopy(assetId)) {
              return;
            }

            button.disabled = true;
            if (!supportsImageClipboardWrite()) {
              openOriginalImageForNativeCopy(assetId);
              button.textContent = 'Opened image';
              setTimeout(() => {
                if ((button.dataset.assetId || '') === assetId) {
                  button.textContent = copyButtonText();
                  button.title = copyButtonTitle();
                }
              }, 1600);
              button.disabled = false;
              return;
            }

            button.textContent = 'Copying...';
            try {
              await copyOriginalImageToClipboard(assetId);
              button.textContent = 'Copied';
              setTimeout(() => {
                if ((button.dataset.assetId || '') === assetId) {
                  button.textContent = copyButtonText();
                  button.title = copyButtonTitle();
                }
              }, 1600);
            } catch (error) {
              console.error(error);
              button.textContent = 'Copy failed';
              setTimeout(() => {
                if ((button.dataset.assetId || '') === assetId) {
                  button.textContent = copyButtonText();
                  button.title = copyButtonTitle();
                }
              }, 2600);
            } finally {
              button.disabled = false;
            }
          });
          document.body.append(button);
          return button;
        };

        const updateCopyImageButton = () => {
          const button = getCopyButton();
          const assetId = currentPhotoAssetId();
          const display = assetId ? 'inline-flex' : 'none';
          if ((button.dataset.assetId || '') !== assetId) {
            button.dataset.assetId = assetId;
          }
          if (button.style.display !== display) {
            button.style.display = display;
          }
          const text = copyButtonText();
          const title = copyButtonTitle();
          if (button.title !== title) {
            button.title = title;
          }
          if (!button.disabled && button.textContent !== text) {
            button.textContent = text;
          }
        };

        const addPickCoverButtons = () => {
          document.querySelectorAll('a[href^="/albums/"], a[href^="http://localhost:2283/albums/"]').forEach((link) => {
            const albumId = albumIdFromLink(link);
            if (!albumId) {
              return;
            }

            if (!link.dataset.profileCoverPickerBound) {
              link.dataset.profileCoverPickerBound = 'true';
              link.addEventListener('mouseenter', () => showTooltip(link));
              link.addEventListener('mouseleave', scheduleHideTooltip);
              link.addEventListener('focusin', () => showTooltip(link));
              link.addEventListener('focusout', scheduleHideTooltip);
            }

            if (!link.querySelector('[data-profile-cover-picker]')) {
              const button = document.createElement('button');
              button.type = 'button';
              button.dataset.profileCoverPicker = 'true';
              button.textContent = 'Pick cover';
              button.title = 'Find profile-style cover candidates';
              button.style.cssText = [
                'position:absolute',
                'right:10px',
                'top:10px',
                'z-index:20',
                'padding:6px 9px',
                'border:1px solid rgba(15,23,42,.18)',
                'border-radius:6px',
                'background:#ffffff',
                'color:#172033',
                'font:700 12px/1.2 system-ui,-apple-system,Segoe UI,sans-serif',
                'box-shadow:0 6px 16px rgba(15,23,42,.18)',
                'cursor:pointer'
              ].join(';');
              button.addEventListener('click', (event) => {
                event.preventDefault();
                event.stopPropagation();
                window.open(`${pickerBase}/album/${albumId}`, '_blank', 'noopener,noreferrer');
              });

              const position = getComputedStyle(link).position;
              if (position === 'static') {
                link.style.position = 'relative';
              }
              link.appendChild(button);
            }
          });
        };

        const updateInjectedUi = () => {
          addPickCoverButtons();
          updateCopyImageButton();
        };

        const scheduleInjectedUiUpdate = () => {
          if (injectedUiTimer) {
            return;
          }

          injectedUiTimer = window.setTimeout(() => {
            injectedUiTimer = 0;
            updateInjectedUi();
          }, 150);
        };

        installPickerStyles();
        const observer = new MutationObserver(scheduleInjectedUiUpdate);
        observer.observe(document.documentElement, { childList: true, subtree: true });
        updateInjectedUi();
        window.addEventListener('popstate', () => setTimeout(updateInjectedUi, 50));
        const originalPushState = history.pushState;
        history.pushState = function (...args) {
          const result = originalPushState.apply(this, args);
          setTimeout(updateInjectedUi, 50);
          return result;
        };
        const originalReplaceState = history.replaceState;
        history.replaceState = function (...args) {
          const result = originalReplaceState.apply(this, args);
          setTimeout(updateInjectedUi, 50);
          return result;
        };
      })();
    </script>
  </body>
</html>
