    <script>
      /**
       * Prevent FOUC on page load.
       */
      const colorThemeKeyName = 'color-theme';

      let theme = localStorage.getItem(colorThemeKeyName);
      if (!theme) {
        theme = { value: 'light', system: true };
      } else if (theme === 'dark' || theme === 'light') {
        theme = { value: theme, system: false };
        localStorage.setItem(colorThemeKeyName, JSON.stringify(theme));
      } else {
        theme = JSON.parse(theme);
      }

      let themeValue = theme.value;
      if (theme.system) {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          themeValue = 'dark';
        } else {
          themeValue = 'light';
        }
      }

      if (themeValue === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    </script>

    <script>
      (() => {
        const pagerId = 'immich-album-pager';

        const isAlbumsPage = () => location.pathname === '/albums';

        const removePager = () => {
          document.getElementById(pagerId)?.remove();
        };

        const getPager = () => {
          if (!isAlbumsPage()) {
            removePager();
            return null;
          }

          let pager = document.getElementById(pagerId);
          if (pager) {
            return pager;
          }

          pager = document.createElement('div');
          pager.id = pagerId;
          pager.innerHTML = `
            <button type="button" data-album-page="first">First</button>
            <button type="button" data-album-page="prev">&lt;</button>
            <span data-album-page-status>Albums</span>
            <button type="button" data-album-page="next">&gt;</button>
            <button type="button" data-album-page="last">Last</button>
            <select data-album-page-size aria-label="Albums per page">
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="200">200</option>
              <option value="500">500</option>
            </select>
          `;
          document.body.append(pager);
          return pager;
        };

        const updatePager = (detail) => {
          const pager = getPager();
          if (!pager || !detail) {
            return;
          }

          const { page, pageSize, total, pageCount } = detail;
          const start = total === 0 ? 0 : (page - 1) * pageSize + 1;
          const end = Math.min(total, page * pageSize);
          pager.hidden = total <= pageSize;
          pager.querySelector('[data-album-page-status]').textContent = `Albums ${start}-${end} of ${total} - page ${page}/${pageCount}`;
          pager.querySelector('[data-album-page="first"]').disabled = page <= 1;
          pager.querySelector('[data-album-page="prev"]').disabled = page <= 1;
          pager.querySelector('[data-album-page="next"]').disabled = page >= pageCount;
          pager.querySelector('[data-album-page="last"]').disabled = page >= pageCount;
          pager.querySelector('[data-album-page-size]').value = String(pageSize);
        };

        const installPagerStyles = () => {
          if (document.getElementById('immich-album-pager-style')) {
            return;
          }

          const style = document.createElement('style');
          style.id = 'immich-album-pager-style';
          style.textContent = `
            #immich-album-pager {
              position: fixed;
              left: 50%;
              bottom: 18px;
              z-index: 2147483646;
              display: flex;
              align-items: center;
              gap: 8px;
              max-width: calc(100vw - 140px);
              padding: 8px 10px;
              border: 1px solid rgba(148, 163, 184, .45);
              border-radius: 999px;
              background: rgba(255, 255, 255, .96);
              color: #111827;
              box-shadow: 0 8px 22px rgba(15, 23, 42, .18);
              font: 600 13px/1 system-ui, -apple-system, Segoe UI, sans-serif;
              transform: translateX(-50%);
            }

            .dark #immich-album-pager {
              border-color: rgba(71, 85, 105, .8);
              background: rgba(17, 24, 39, .96);
              color: #f8fafc;
            }

            #immich-album-pager button,
            #immich-album-pager select {
              height: 30px;
              border: 1px solid rgba(148, 163, 184, .5);
              border-radius: 999px;
              background: transparent;
              color: inherit;
              padding: 0 10px;
              font: inherit;
            }

            #immich-album-pager button:not(:disabled) {
              cursor: pointer;
            }

            #immich-album-pager button:disabled {
              opacity: .45;
            }

            #immich-album-pager span {
              white-space: nowrap;
            }
          `;
          document.head.append(style);
        };

        const updateForCurrentRoute = () => {
          if (!isAlbumsPage()) {
            removePager();
          }
        };

        installPagerStyles();

        document.addEventListener('click', (event) => {
          const button = event.target.closest?.('[data-album-page]');
          if (!button || !window.__immichAlbumPager) {
            return;
          }

          const { page, pageCount } = window.__immichAlbumPager;
          const action = button.dataset.albumPage;
          if (action === 'first') {
            window.__immichAlbumPager.setPage(1);
          } else if (action === 'prev') {
            window.__immichAlbumPager.setPage(page - 1);
          } else if (action === 'next') {
            window.__immichAlbumPager.setPage(page + 1);
          } else if (action === 'last') {
            window.__immichAlbumPager.setPage(pageCount);
          }
        });

        document.addEventListener('change', (event) => {
          const select = event.target.closest?.('[data-album-page-size]');
          if (select && window.__immichAlbumPager) {
            window.__immichAlbumPager.setPageSize(select.value);
          }
        });

        window.addEventListener('immich-album-pager-update', (event) => updatePager(event.detail));
        window.addEventListener('popstate', updateForCurrentRoute);

        const originalPushState = history.pushState;
        history.pushState = function (...args) {
          const result = originalPushState.apply(this, args);
          setTimeout(updateForCurrentRoute, 0);
          return result;
        };

        const originalReplaceState = history.replaceState;
        history.replaceState = function (...args) {
          const result = originalReplaceState.apply(this, args);
          setTimeout(updateForCurrentRoute, 0);
          return result;
        };
      })();
    </script>

    <script>
      (() => {
        const pickerBase = `${location.protocol}//${location.hostname}:3111`;
        const albumPattern = /^\/albums\/([0-9a-fA-F-]{36})$/;
        const tooltipId = 'immich-profile-cover-tooltip';
        const candidateCache = new Map();
        let activeAlbumId = '';
        let hideTimer = 0;

        const albumIdFromLink = (link) => {
          try {
            const href = new URL(link.getAttribute('href'), location.origin);
            const match = href.pathname.match(albumPattern);
            return match?.[1] || '';
          } catch {
            return '';

        };

        const installPickerStyles = () => {
          if (document.getElementById('immich-profile-cover-picker-style')) {
            return;
          }

          style.id = 'immich-profile-cover-picker-style';
          style.textContent = `
            #immich-profile-cover-tooltip {
              position: fixed;
              z-index: 2147483647;
              display: none;
              width: min(520px, calc(100vw - 24px));
              max-height: min(540px, calc(100vh - 24px));
              overflow: auto;
              padding: 10px;
              border: 1px solid rgba(148, 163, 184, .45);
              border-radius: 8px;
              background: rgba(255, 255, 255, .98);
              color: #111827;
              box-shadow: 0 16px 42px rgba(15, 23, 42, .28);
              font: 500 12px/1.35 system-ui, -apple-system, Segoe UI, sans-serif;
            }

            .dark #immich-profile-cover-tooltip {
              border-color: rgba(71, 85, 105, .8);
              background: rgba(17, 24, 39, .98);
              color: #f8fafc;
            }

            #immich-profile-cover-tooltip strong {
              display: block;
              margin: 0 0 8px;
              font-size: 13px;
            }

            #immich-profile-cover-tooltip .profile-cover-grid {
              display: grid;
              grid-template-columns: repeat(5, minmax(0, 1fr));
              gap: 8px;
            }

            #immich-profile-cover-tooltip button {
              min-width: 0;
              padding: 0;
              border: 1px solid rgba(148, 163, 184, .45);
              border-radius: 7px;
              background: transparent;
              color: inherit;
              cursor: pointer;
              overflow: hidden;
              text-align: left;
            }

            #immich-profile-cover-tooltip img {
              display: block;
              width: 100%;
              aspect-ratio: 4 / 5;
              object-fit: cover;
              object-position: center top;
              background: #e5e7eb;
            }

            #immich-profile-cover-tooltip span {
              display: block;
              padding: 5px 6px;
              white-space: nowrap;
              overflow: hidden;
              text-overflow: ellipsis;
            }

            #immich-profile-cover-tooltip .profile-cover-status {
              margin-top: 8px;
              color: #2563eb;
            }
          `;
          document.head.append(style);
        };

        const getTooltip = () => {
          let tooltip = document.getElementById(tooltipId);
          if (tooltip) {
            return tooltip;
          }
          tooltip = document.createElement('div');
          tooltip.id = tooltipId;
          tooltip.addEventListener('mouseenter', () => clearTimeout(hideTimer));
          tooltip.addEventListener('mouseleave', scheduleHideTooltip);
          document.body.append(tooltip);
          return tooltip;
        };

        const scheduleHideTooltip = () => {
          clearTimeout(hideTimer);
          hideTimer = setTimeout(() => {
            const tooltip = getTooltip();
            tooltip.style.display = 'none';
            activeAlbumId = '';
          }, 180);
        };

        const positionTooltip = (tooltip, anchor, point) => {
          const margin = 12;
          const width = Math.min(520, window.innerWidth - margin * 2);
          const height = Math.min(540, window.innerHeight - margin * 2);
          const rect = anchor.getBoundingClientRect();
          const baseX = point?.clientX ?? Math.min(rect.left + rect.width / 2, window.innerWidth - margin);
          const baseY = point?.clientY ?? Math.min(rect.top + rect.height / 2, window.innerHeight - margin);
          const left = Math.max(margin, Math.min(window.innerWidth - width - margin, baseX + 14));
          const below = baseY + 14;
          const above = baseY - height - 14;
          const top = below + 220 < window.innerHeight ? below : Math.max(margin, above);
          tooltip.style.width = `${width}px`;
          tooltip.style.left = `${left}px`;
          tooltip.style.top = `${top}px`;
        };

        const renderCandidates = (tooltip, albumId, payload) => {
          const candidates = payload.candidates || [];
          if (!candidates.length) {
            tooltip.innerHTML = `<strong>${payload.albumName || 'Album cover candidates'}</strong><div>No face candidates found.</div>`;
            return;
          }

          tooltip.innerHTML = `
            <strong>${payload.albumName || 'Album cover candidates'}</strong>
            <div class="profile-cover-grid"></div>
            <div class="profile-cover-status">Click a result to set it as cover.</div>
          `;
          const grid = tooltip.querySelector('.profile-cover-grid');
          const status = tooltip.querySelector('.profile-cover-status');
          candidates.slice(0, 5).forEach((candidate) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.title = `Set #${candidate.rank} as album cover`;
            const imageUrl = candidate.thumbnailUrl || candidate.cropUrl;
            button.innerHTML = `
              <img src="${imageUrl}" alt="Cover candidate ${candidate.rank}">
              <span>#${candidate.rank} score ${Number(candidate.score || 0).toFixed(3)}</span>
            `;
            button.addEventListener('click', async (event) => {
              event.preventDefault();
              event.stopPropagation();
              status.textContent = 'Setting cover...';
              const response = await fetch(`${pickerBase}/api/set-cover?albumId=${albumId}&assetId=${candidate.assetId}`);
              if (!response.ok) {
                throw new Error(await response.text());
              }
              status.textContent = `Cover set to #${candidate.rank}. Refresh Immich if the old cover is still cached.`;
            });
            grid.append(button);
          });
        };

        const showTooltip = async (link, point) => {
          const albumId = albumIdFromLink(link);
          if (!albumId) {
            return;
          }
          clearTimeout(hideTimer);
          activeAlbumId = albumId;
          const tooltip = getTooltip();
          tooltip.style.display = 'block';
          tooltip.innerHTML = '<strong>Album cover candidates</strong><div>Loading top 5...</div>';

          try {
            const payload = candidateCache.get(albumId) || await fetch(`${pickerBase}/api/album/${albumId}/candidates?fast=1`).then((response) => {

                throw new Error(`HTTP ${response.status}`);

              return response.json();
            });
            candidateCache.set(albumId, payload);
            if (activeAlbumId === albumId) {
              renderCandidates(tooltip, albumId, payload);
              positionTooltip(tooltip, link, point);
            }
          } catch (error) {
            if (activeAlbumId === albumId) {
              tooltip.innerHTML = `<strong>Album cover candidates</strong><div>Could not load candidates: ${String(error.message || error)}</div>`;
            }
          }
        };

        const addPickCoverButtons = () => {
          document.querySelectorAll('a[href^="/albums/"], a[href^="http://localhost:2283/albums/"]').forEach((link) => {

            if (!albumId) {

            }

            if (!link.dataset.profileCoverPickerBound) {

                }

              link.addEventListener('mouseleave', scheduleHideTooltip);
              link.addEventListener('focusin', (event) => showTooltip(link, event));
              link.addEventListener('focusout', scheduleHideTooltip);
            }

            if (!link.querySelector('[data-profile-cover-picker]')) {
              const button = document.createElement('button');
              button.type = 'button';
              button.dataset.profileCoverPicker = 'true';
              button.textContent = 'Pick cover';
              button.title = 'Find profile-style cover candidates';
              button.style.cssText = [
                'position:absolute',
                'right:10px',
                'top:10px',
                'z-index:20',
                'padding:6px 9px',
                'border:1px solid rgba(15,23,42,.18)',
                'border-radius:6px',
                'background:#ffffff',
                'color:#172033',
                'font:700 12px/1.2 system-ui,-apple-system,Segoe UI,sans-serif',
                'box-shadow:0 6px 16px rgba(15,23,42,.18)',
                'cursor:pointer'
              ].join(';');
              button.addEventListener('click', (event) => {
                event.preventDefault();
                event.stopPropagation();
                window.open(`${pickerBase}/album/${albumId}`, '_blank', 'noopener,noreferrer');
              });

              const position = getComputedStyle(link).position;
              if (position === 'static') {
                link.style.position = 'relative';
              }
              link.appendChild(button);
            }
          });
        };

        installPickerStyles();
        const observer = new MutationObserver(addPickCoverButtons);
        observer.observe(document.documentElement, { childList: true, subtree: true });
        addPickCoverButtons();
        window.addEventListener('popstate', () => setTimeout(addPickCoverButtons, 50));
        const originalPushState = history.pushState;
        history.pushState = function (...args) {
          const result = originalPushState.apply(this, args);
          setTimeout(addPickCoverButtons, 50);
          return result;
        };
        const originalReplaceState = history.replaceState;
        history.replaceState = function (...args) {
          const result = originalReplaceState.apply(this, args);
          setTimeout(addPickCoverButtons, 50);
          return result;
        };
      })();
