<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Immich Face Search</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #14213d;
        background: #f7f8fb;
      }

      main {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 24px;
      }

      h1 {
        font-size: 26px;
        margin: 0 0 12px;
      }

      p {
        font-size: 15px;
        line-height: 1.5;
        margin: 0 0 12px;
      }

      code {
        overflow-wrap: anywhere;
      }

      .status {
        border: 1px solid #d8deea;
        border-radius: 8px;
        background: #fff;
        padding: 20px;
      }

      .error {
        color: #8a1f11;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="status">
        <h1>Searching Immich</h1>
        <p id="status">Preparing the selected image...</p>
      </section>
    </main>
    <script src="search.js"></script>
  </body>
</html>
